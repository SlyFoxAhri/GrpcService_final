syntax = "proto3";

option csharp_namespace = "GrpcService";

package junk;

service Service {
  rpc Login (User) returns (SessionId);
  rpc Logout(SessionId) returns (Resoult);

  rpc Create(Yard) returns (Resoult);
  rpc Read(Empty) returns (YardList);
  rpc Update(Yard) returns (Resoult);
  rpc Delete(Yard) returns (Resoult);

  rpc BudaPestCount(Empty) returns (BPCount);
  rpc SeveralYards(Empty) returns (YardList);
  rpc WasteType(Count) returns (YardList);

}

message Empty{}

message User{
	string name = 1;
	string password = 2;
}

message SessionId{
	string id = 1;
	string jwtoken = 2;
}

message Resoult{
	string success = 1;
}

message Yard{
	string sessionid = 1;
	int32 id = 2;
	string district  = 3;
	string address = 4;
	string waste = 5;
}

message NewYard{
	int32 id = 1;
	string district  = 2;
	string address = 3;
	string waste = 4;
}

message YardList { 
	repeated NewYard yards = 1; 
}

message BPCount{
	int32 buda_count = 1;
	int32 pest_count = 2;
}

message Count{
	int32 count = 1;
}
